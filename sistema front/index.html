<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Vendas</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js and SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --surface-color: rgba(22, 27, 34, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-primary: #58a6ff;
            --accent-secondary: #bc8cff;
            --gradient-1: linear-gradient(135deg, #58a6ff 0%, #316dca 100%);
            --gradient-2: linear-gradient(135deg, #bc8cff 0%, #8957e5 100%);
            --gradient-3: linear-gradient(135deg, #3fb950 0%, #2b8000 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(88, 166, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(188, 140, 255, 0.05), transparent 25%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .controls label {
            font-weight: 500;
            color: var(--text-secondary);
        }

        select {
            background-color: rgba(13, 17, 23, 0.8);
            color: var(--text-primary);
            border: 1px solid var(--surface-border);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        select:hover, select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
        }

        select option {
            background-color: var(--bg-color);
        }

        .upload-btn {
            background-color: rgba(88, 166, 255, 0.1);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .upload-btn:hover {
            background-color: var(--accent-primary);
            color: var(--bg-color);
        }

        .upload-hidden {
            display: none;
        }

        main {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .kpi-container {
                grid-template-columns: 1fr !important;
            }
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* KPI Square Column */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .kpi-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
        }

        .kpi-card.pedido::before { background: var(--gradient-1); }
        .kpi-card.meta::before { background: var(--gradient-2); }
        .kpi-card.media::before { background: var(--gradient-3); }

        .kpi-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .kpi-value {
            font-size: 2.2rem;
            font-weight: 700;
        }

        .kpi-sub {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-primary);
        }
        
        .badge.success {
            background: rgba(63, 185, 80, 0.1);
            color: #3fb950;
        }

        /* Chart Area */
        .chart-container {
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            margin-bottom: 1.5rem;
        }

        .chart-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .chart-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        .canvas-wrapper {
            position: relative;
            height: 500px;
            min-height: 50vh;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Performance Dashboard</h1>
        <div class="controls">
            <label class="upload-btn">
                📄 Subir Vendas
                <input type="file" id="uploadVendas" class="upload-hidden" accept=".xlsx, .xls, .csv, .txt">
            </label>
            <label class="upload-btn">
                🎯 Subir Metas
                <input type="file" id="uploadMetas" class="upload-hidden" accept=".xlsx, .xls, .csv, .txt">
            </label>
            <label for="regiaoSelect">Região:</label>
            <select id="regiaoSelect">
                <option value="Todas">Todas as Regiões</option>
                <option value="Norte">Norte</option>
                <option value="Sul">Sul</option>
                <option value="Leste">Leste</option>
                <option value="Oeste">Oeste</option>
            </select>
        </div>
    </header>

    <main>
        <!-- Quadrado (Cards) -->
        <div class="kpi-container">
            <div class="glass-card kpi-card pedido">
                <div class="kpi-title">Pedido (Total Vendido)</div>
                <div class="kpi-value" id="kpiPedido">R$ 0,00</div>
                <div class="kpi-sub">
                    <span id="kpiAvgPedidos">Média: R$ 0,00</span>
                </div>
            </div>

            <div class="glass-card kpi-card meta">
                <div class="kpi-title">Meta Estabelecida</div>
                <div class="kpi-value" id="kpiMeta">R$ 0,00</div>
                <div class="kpi-sub">Objetivo regional</div>
            </div>

            <div class="glass-card kpi-card media">
                <div class="kpi-title">% da Média dos Pedidos + Meta</div>
                <div class="kpi-value" id="kpiPorcentagem">0%</div>
                <div class="kpi-sub">
                    <span class="badge" id="kpiProgresso">Progresso Total</span>
                </div>
            </div>
        </div>

        <!-- Gráfico -->
        <div class="glass-card chart-container">
            <div class="chart-header">
                <div class="chart-title">Análise de Produtos</div>
                <div class="chart-subtitle">Valor de vendas e porcentagem individual de cada produto</div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="salesChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        // Mock Data based on base_dados.py and meta.py
        let database = [
            {"produto": "Gasolina", "regiao": "Norte", "valor": 5000},
            {"produto": "Gasolina Aditivada", "regiao": "Norte", "valor": 3000},
            {"produto": "Etanol", "regiao": "Norte", "valor": 4500},
            {"produto": "Etanol Aditivado", "regiao": "Norte", "valor": 2000},
            {"produto": "S10", "regiao": "Norte", "valor": 8000},
            {"produto": "S10 Aditivado", "regiao": "Norte", "valor": 1500},
            {"produto": "S500", "regiao": "Norte", "valor": 6000},
            {"produto": "S500 Aditivado", "regiao": "Norte", "valor": 1000},
            {"produto": "Gasolina", "regiao": "Sul", "valor": 12000},
            {"produto": "Gasolina Aditivada", "regiao": "Sul", "valor": 4000},
            {"produto": "Etanol", "regiao": "Sul", "valor": 5000},
            {"produto": "Etanol Aditivado", "regiao": "Sul", "valor": 2500},
            {"produto": "S10", "regiao": "Sul", "valor": 10000},
            {"produto": "S10 Aditivado", "regiao": "Sul", "valor": 2000},
            {"produto": "S500", "regiao": "Sul", "valor": 8000},
            {"produto": "S500 Aditivado", "regiao": "Sul", "valor": 1500},
        ];

        let goals = {
            "Todas": 100000,
            "Norte": 20000,
            "Sul": 30000,
            "Leste": 25000,
            "Oeste": 25000
        };

        // Formatter for BRL
        const formatBRL = (value) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        };

        let chartInstance = null;

        function updateDashboard() {
            const selectedRegion = document.getElementById('regiaoSelect').value;
            
            // Filter Data
            const filteredData = database.filter(item => selectedRegion === 'Todas' || item.regiao === selectedRegion);
            
            // Aggregate values by product
            const productSales = {};
            let totalPedido = 0;

            filteredData.forEach(item => {
                if (!productSales[item.produto]) {
                    productSales[item.produto] = 0;
                }
                productSales[item.produto] += item.valor;
                totalPedido += item.valor;
            });

            const currentMeta = goals[selectedRegion];
            
            // Calculate averages and percentages
            const numOrders = filteredData.length || 1;
            const avgPedido = totalPedido / numOrders;
            
            // Formula requested: "% da media dos pedidos + a meta"
            // Usually this means comparing the total sales to the goal, and also showing average
            // Total Orders percentage relative to Goal
            const percentualProgresso = currentMeta > 0 ? (totalPedido / currentMeta) * 100 : 0;
            const porcentagemIndice = currentMeta > 0 ? ((avgPedido + currentMeta) / currentMeta) * 100 : 0; // Literal interpretation of text if needed, but let's show actual progress
            
            // Update KPIs
            document.getElementById('kpiPedido').innerText = formatBRL(totalPedido);
            document.getElementById('kpiAvgPedidos').innerText = `Média/Pedido: ${formatBRL(avgPedido)}`;
            document.getElementById('kpiMeta').innerText = formatBRL(currentMeta);
            
            document.getElementById('kpiPorcentagem').innerText = `${percentualProgresso.toFixed(1)}%`;
            
            const badge = document.getElementById('kpiProgresso');
            if (percentualProgresso >= 100) {
                badge.innerText = "Meta Atingida!";
                badge.className = "badge success";
            } else {
                badge.innerText = "Em progresso";
                badge.className = "badge";
            }

            // Prepare Chart Data
            const labels = Object.keys(productSales).sort();
            const dataValues = labels.map(p => productSales[p]);
            
            // Calculate Individual Percentage
            const dataPercentages = dataValues.map(v => totalPedido > 0 ? ((v / totalPedido) * 100).toFixed(1) : 0);

            renderChart(labels, dataValues, dataPercentages);
        }

        function renderChart(labels, values, percentages) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            Chart.defaults.color = '#8b949e';
            Chart.defaults.font.family = "'Outfit', sans-serif";

            // Creating Gradients
            const gradientBar = ctx.createLinearGradient(0, 0, 0, 400);
            gradientBar.addColorStop(0, 'rgba(88, 166, 255, 0.8)');
            gradientBar.addColorStop(1, 'rgba(188, 140, 255, 0.6)');

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Valor Vendido (R$)',
                        data: values,
                        backgroundColor: gradientBar,
                        borderRadius: 8,
                        borderWidth: 0,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(22, 27, 34, 0.9)',
                            titleColor: '#e6edf3',
                            bodyColor: '#e6edf3',
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    const rawValue = context.raw;
                                    const percent = percentages[context.dataIndex];
                                    return [
                                        `Vendas: ${formatBRL(rawValue)}`,
                                        `Participação Individual: ${percent}%`
                                    ];
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                callback: function(value) {
                                    return 'R$ ' + (value / 1000) + 'k';
                                }
                            }
                        },
                        x: {
                            grid: { display: false, drawBorder: false }
                        }
                    },
                    animation: {
                        y: {
                            duration: 1000,
                            easing: 'easeOutQuart'
                        }
                    }
                }
            });
        }

        // Handle File Uploads with SheetJS
        function handleFileUpload(e, callback) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.SheetNames[0];
                // header: 1 retorna os dados como um array de arrays (linhas e colunas por índice)
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet], {header: 1});
                callback(jsonData);
            };
            reader.readAsArrayBuffer(file);
            e.target.value = ''; // Reseta o input de arquivo
        }

        document.getElementById('uploadVendas').addEventListener('change', (e) => {
            const selectedRegion = document.getElementById('regiaoSelect').value;
            
            handleFileUpload(e, (data) => {
                if (data.length > 0) {
                    let newVendas = [];
                    data.forEach(row => {
                        // Ignora linhas vazias ou com menos de 2 colunas
                        if (!row || row.length < 2) return;
                        
                        let col1 = String(row[0]).trim(); // Nome do Produto
                        let col2 = parseFloat(row[1]);    // Quantidade / Valor
                        
                        // Ignora colunas que são cabeçalhos (onde parseFloat retorna NaN)
                        if (!isNaN(col2) && col1 !== "undefined" && col1 !== "") {
                            newVendas.push({
                                produto: col1,
                                regiao: selectedRegion, // Associa ao filtro selecionado na tela
                                valor: col2
                            });
                        }
                    });
                    
                    if (newVendas.length > 0) {
                        // Substitui os dados da região selecionada pelos novos dados carregados
                        if (selectedRegion !== "Todas") {
                            database = database.filter(item => item.regiao !== selectedRegion);
                        } else {
                            // Se "Todas" estiver selecionado, vamos assumir que ele quer substituir tudo ou os sem região
                            database = [];
                        }
                        database = database.concat(newVendas);
                        updateDashboard();
                        alert(`Vendas atualizadas com sucesso para a região: ${selectedRegion}!`);
                    } else {
                        alert("Não foram encontrados valores numéricos válidos na Coluna 2.");
                    }
                }
            });
        });

        document.getElementById('uploadMetas').addEventListener('change', (e) => {
            handleFileUpload(e, (data) => {
                if (data.length > 0) {
                    let updated = 0;
                    data.forEach(row => {
                        if (!row || row.length < 2) return;
                        
                        let col1 = String(row[0]).trim(); // Região
                        let col2 = parseFloat(row[1]);    // Meta
                        
                        if (!isNaN(col2) && col1 !== "undefined" && col1 !== "") {
                            goals[col1] = col2;
                            updated++;
                        }
                    });
                    
                    if (updated > 0) {
                        updateDashboard();
                        alert("Metas regionais atualizadas com sucesso!");
                    } else {
                        alert("Não foram encontrados valores numéricos válidos na Coluna 2.");
                    }
                }
            });
        });

        // Initialize
        document.getElementById('regiaoSelect').addEventListener('change', updateDashboard);
        updateDashboard();
    </script>
</body>
</html>
